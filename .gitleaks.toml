title = "Gitleaks Config"

[extend]
useDefault = true

# Ignorar arquivos de documentação
[paths]
  [[paths.ignore]]
    path = '''README\.md'''
    reason = "Arquivo de documentação com exemplos"

[[rules]]
id = "hardcoded-api-key"
description = "Hardcoded API Key"
regex = '''sk_live_[a-zA-Z0-9]+'''
tags = ["key", "api"]

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''ghp_[a-zA-Z0-9]{36}'''
tags = ["key", "github"]

[[rules]]
id = "hardcoded-password"
description = "Hardcoded Password"
regex = '''(password|passwd|pwd|senha)\s*=\s*["'][^"']+["']'''
tags = ["key", "password"]