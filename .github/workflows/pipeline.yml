name: 🔐 Pipeline DevSecOps

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pipeline:
    name: Build, Segurança e Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ✅ PASSO 1: Checkout do Código
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ PASSO 2: Setup Node.js e instalação de dependências
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Instalar Dependências
        run: |
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          npm list --depth=0

      # ✅ PASSO 3: Build (verificação)
      - name: ⚙️ Build
        run: |
          echo "Verificando arquivos..."
          ls -la src/
          echo "Build OK!"

      # ✅ PASSO 4: Secrets Scanning com Gitleaks
      - name: 🔑 Secrets Scanning com Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ PASSO 5: SAST com Semgrep
      - name: 🔍 SAST - Semgrep
        run: |
          pip install semgrep
          semgrep scan --config p/security-audit --error src/ || true

      # ✅ PASSO 6: SCA com Grype
      - name: 📦 SCA - Grype
        run: |
          # Instala o Grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          
          # Verifica a instalação
          grype version
          
          # Escaneia apenas a pasta src e package.json
          grype dir:. --fail-on medium --scope all-layers --only-fixed

      # ✅ PASSO 7: Deploy (só roda se tudo passar)
      - name: 🌐 Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload para Produção
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src'

      - name: 🚀 Deploy em Produção
        id: deployment
        uses: actions/deploy-pages@v4